<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>DualShot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --accent:#ff3c5f; --accent2:#ff8c42;
      --text:#f0f0f0; --muted:#666; --border:rgba(255,255,255,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      width:100%;height:100%;background:#000;color:var(--text);
      font-family:'Syne',sans-serif;overflow:hidden;
      -webkit-tap-highlight-color:transparent;user-select:none;
    }

    /* ── full-screen preview ── */
    #mainCanvas{position:fixed;inset:0;width:100%;height:100%;display:block;background:#000}
    #srcVideo,#previewCanvas{position:fixed;left:-9999px;top:-9999px;visibility:hidden;pointer-events:none}

    /* ── PiP ── */
    .pip{
      position:fixed;top:72px;right:14px;
      width:clamp(68px,20vw,104px);aspect-ratio:9/16;
      border-radius:12px;overflow:hidden;
      border:2px solid rgba(255,60,95,0.65);
      box-shadow:0 4px 20px rgba(0,0,0,0.8);
      z-index:20;transition:opacity 0.3s;
    }
    .pip canvas{width:100%;height:100%;display:block}
    .pip-label{
      position:absolute;bottom:0;left:0;right:0;
      background:linear-gradient(transparent,rgba(0,0,0,0.8));
      font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1px;
      color:rgba(255,255,255,0.75);text-align:center;padding:10px 0 4px;
    }
    .pip-tag{
      position:absolute;top:5px;left:5px;
      font-family:'DM Mono',monospace;font-size:7px;letter-spacing:0.5px;
      background:rgba(255,60,95,0.85);color:#fff;padding:2px 5px;border-radius:4px;
    }

    /* ── Header ── */
    header{
      position:fixed;top:0;left:0;right:0;z-index:30;
      display:flex;align-items:center;justify-content:space-between;
      padding-top:max(env(safe-area-inset-top,0px),12px);
      padding-left:16px;padding-right:16px;padding-bottom:12px;
      background:linear-gradient(to bottom,rgba(0,0,0,0.72),transparent);
      pointer-events:none;
    }
    .logo{
      font-size:18px;font-weight:800;letter-spacing:-0.5px;
      background:linear-gradient(135deg,#fff 30%,var(--accent) 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .status-pill{
      display:flex;align-items:center;gap:6px;
      background:rgba(0,0,0,0.5);backdrop-filter:blur(12px);
      border:1px solid var(--border);border-radius:999px;padding:5px 11px;
      font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.5px;
      pointer-events:auto;
    }
    .sdot{width:6px;height:6px;border-radius:50%;background:#555;transition:background 0.3s;flex-shrink:0}
    .sdot.live{background:var(--accent);animation:sp 1.2s infinite}
    @keyframes sp{0%,100%{box-shadow:0 0 0 0 rgba(255,60,95,0.6)}50%{box-shadow:0 0 0 4px rgba(255,60,95,0)}}

    /* ── REC timer ── */
    .rec-timer{
      position:fixed;top:0;left:50%;transform:translateX(-50%);
      padding-top:max(env(safe-area-inset-top,0px),14px);
      z-index:35;pointer-events:none;opacity:0;transition:opacity 0.3s;
    }
    .rec-timer.show{opacity:1}
    .rec-inner{
      display:flex;align-items:center;gap:7px;
      background:rgba(255,60,95,0.9);backdrop-filter:blur(8px);
      padding:5px 14px;border-radius:999px;
      font-family:'DM Mono',monospace;font-size:13px;color:#fff;
    }
    .rec-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:blink 1s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

    /* ── View tabs ── */
    .vtabs{
      position:fixed;bottom:138px;left:50%;transform:translateX(-50%);
      z-index:25;display:flex;
      background:rgba(0,0,0,0.5);backdrop-filter:blur(14px);
      border:1px solid var(--border);border-radius:999px;padding:3px;
    }
    .vtab{
      font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;
      padding:6px 16px;border-radius:999px;cursor:pointer;
      color:rgba(255,255,255,0.45);border:none;background:transparent;transition:all 0.2s;
    }
    .vtab.active{background:rgba(255,255,255,0.13);color:#fff}

    /* ── Controls ── */
    .controls{
      position:fixed;bottom:0;left:0;right:0;z-index:30;
      padding:18px 28px;
      padding-bottom:max(env(safe-area-inset-bottom,18px),28px);
      background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
      display:flex;align-items:center;justify-content:space-between;
    }
    .btn-side{
      width:50px;height:50px;border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.18);
      background:rgba(0,0,0,0.45);backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;color:#fff;transition:all 0.18s;
    }
    .btn-side:active{transform:scale(0.9);background:rgba(255,255,255,0.12)}
    .btn-side svg{width:19px;height:19px}
    .btn-record{
      width:78px;height:78px;border-radius:50%;
      border:3px solid rgba(255,255,255,0.22);background:transparent;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all 0.15s;
    }
    .btn-record:active{transform:scale(0.92)}
    .rec-core{
      width:56px;height:56px;border-radius:50%;background:var(--accent);
      transition:all 0.28s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow:0 0 24px rgba(255,60,95,0.45);
    }
    .btn-record.recording{border-color:rgba(255,60,95,0.5)}
    .btn-record.recording .rec-core{border-radius:10px;width:32px;height:32px}

    /* ── Processing overlay ── */
    .processing{
      position:fixed;inset:0;z-index:60;
      background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;
      padding:40px;text-align:center;
    }
    .processing.show{display:flex}
    .proc-spinner{
      width:56px;height:56px;border-radius:50%;
      border:3px solid rgba(255,255,255,0.08);
      border-top-color:var(--accent);
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .proc-title{font-size:20px;font-weight:800}
    .proc-sub{font-size:13px;color:var(--muted);line-height:1.6;max-width:260px}
    .proc-bar-wrap{width:100%;max-width:260px;background:rgba(255,255,255,0.08);border-radius:999px;height:4px;overflow:hidden}
    .proc-bar{height:100%;background:var(--accent);border-radius:999px;width:0%;transition:width 0.3s}
    .proc-step{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px}

    /* ── Downloads sheet ── */
    .dl-sheet{
      position:fixed;bottom:0;left:0;right:0;z-index:50;
      background:#0c0c10;border-top:1px solid rgba(255,255,255,0.07);
      border-radius:22px 22px 0 0;padding:0 18px;
      padding-bottom:max(env(safe-area-inset-bottom,18px),28px);
      transform:translateY(100%);transition:transform 0.38s cubic-bezier(0.32,0.72,0,1);
    }
    .dl-sheet.open{transform:translateY(0)}
    .handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.14);margin:14px auto 18px}
    .sheet-title{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
    .dl-row{display:flex;gap:12px;margin-bottom:12px}
    .dl-card{
      flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
      border-radius:16px;padding:18px 12px;
      text-decoration:none;color:var(--text);cursor:pointer;
      transition:all 0.18s;animation:su 0.4s ease both;
    }
    .dl-card:nth-child(2){animation-delay:0.07s}
    @keyframes su{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .dl-card:active{background:rgba(255,255,255,0.08);transform:scale(0.97)}
    .dl-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
    .dl-ico.h{background:rgba(255,140,66,0.14);color:var(--accent2)}
    .dl-ico.v{background:rgba(255,60,95,0.14);color:var(--accent)}
    .dl-ico svg{width:20px;height:20px}
    .dl-name{font-size:13px;font-weight:700}
    .dl-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-align:center}
    .dl-save{
      display:flex;align-items:center;gap:5px;
      background:rgba(255,255,255,0.08);border-radius:999px;
      padding:5px 12px;font-size:11px;font-weight:700;color:#fff;margin-top:2px;
    }
    .btn-done{
      width:100%;padding:14px;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);
      border-radius:14px;color:var(--muted);
      font-family:'Syne',sans-serif;font-size:14px;font-weight:700;
      cursor:pointer;transition:all 0.18s;
    }
    .btn-done:active{background:rgba(255,255,255,0.1)}

    /* ── Toast ── */
    .toast{
      position:fixed;bottom:130px;left:50%;
      transform:translateX(-50%) translateY(8px);
      background:rgba(18,18,22,0.92);backdrop-filter:blur(14px);
      border:1px solid var(--border);border-radius:999px;
      padding:9px 18px;font-size:12px;color:var(--text);
      opacity:0;pointer-events:none;white-space:nowrap;
      transition:all 0.25s;z-index:40;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── Init overlay ── */
    .init{
      position:fixed;inset:0;z-index:100;background:#000;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:16px;padding:40px;text-align:center;
    }
    .init.hide{animation:fo 0.35s forwards;pointer-events:none}
    @keyframes fo{to{opacity:0}}
    .init-icon{
      width:80px;height:80px;border-radius:28px;
      background:linear-gradient(135deg,var(--accent2),var(--accent));
      display:flex;align-items:center;justify-content:center;margin-bottom:4px;
      box-shadow:0 12px 40px rgba(255,60,95,0.35);
    }
    .init-icon svg{width:38px;height:38px;color:#fff}
    .init-title{font-size:30px;font-weight:800;letter-spacing:-1px}
    .init-sub{font-size:13px;color:var(--muted);line-height:1.7;max-width:240px}
    .chips{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:4px 0}
    .chip{
      font-family:'DM Mono',monospace;font-size:10px;letter-spacing:0.5px;
      padding:4px 10px;border-radius:999px;
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.55);
    }
    .btn-allow{
      background:var(--accent);color:#fff;border:none;border-radius:16px;
      padding:16px 0;font-size:16px;font-weight:800;
      font-family:'Syne',sans-serif;cursor:pointer;margin-top:8px;
      width:100%;max-width:280px;
      box-shadow:0 8px 28px rgba(255,60,95,0.4);transition:all 0.18s;
    }
    .btn-allow:active{transform:scale(0.96)}
    .init-err{font-size:11px;color:#ff6b6b;font-family:'DM Mono',monospace;min-height:16px}
  </style>
</head>
<body>

<!-- Off-screen source video (display only, not recorded) -->
<video id="srcVideo" autoplay playsinline muted></video>

<!-- Small canvas used only for PiP preview display -->
<canvas id="previewCanvas"></canvas>

<!-- Full-screen display canvas -->
<canvas id="mainCanvas"></canvas>

<!-- PiP vertical preview -->
<div class="pip" id="pip">
  <canvas id="pipCanvas"></canvas>
  <div class="pip-tag">9:16</div>
  <div class="pip-label">VERTICAL</div>
</div>

<!-- Header -->
<header>
  <div class="logo">DualShot</div>
  <div class="status-pill">
    <div class="sdot" id="sdot"></div>
    <span id="statusTxt">READY</span>
  </div>
</header>

<!-- REC Timer -->
<div class="rec-timer" id="recTimer">
  <div class="rec-inner">
    <div class="rec-dot"></div>
    <span id="timerDisp">00:00</span>
  </div>
</div>

<!-- View tabs -->
<div class="vtabs">
  <button class="vtab active" id="tabH" onclick="setView('h')">16 : 9</button>
  <button class="vtab" id="tabV" onclick="setView('v')">9 : 16</button>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn-side" id="btnFlip">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>
    </svg>
  </button>
  <div class="btn-record" id="btnRecord"><div class="rec-core"></div></div>
  <button class="btn-side" id="btnAction">
    <svg id="iconGuide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/>
    </svg>
    <svg id="iconDl" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>
</div>

<!-- Processing overlay -->
<div class="processing" id="processing">
  <div class="proc-spinner"></div>
  <div class="proc-title">Processing</div>
  <div class="proc-sub" id="procSub">Cropping vertical video at native quality…</div>
  <div class="proc-bar-wrap"><div class="proc-bar" id="procBar"></div></div>
  <div class="proc-step" id="procStep">LOADING FFMPEG</div>
</div>

<!-- Downloads sheet -->
<div class="dl-sheet" id="dlSheet">
  <div class="handle"></div>
  <div class="sheet-title">Recordings ready</div>
  <div class="dl-row">
    <a class="dl-card" id="dlH" download="horizontal_16x9.mp4">
      <div class="dl-ico h">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
        </svg>
      </div>
      <div class="dl-name">Horizontal</div>
      <div class="dl-meta" id="dlHmeta">16:9</div>
      <div class="dl-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11">
          <path d="M12 17V3"/><path d="M7 12l5 5 5-5"/>
        </svg>Save
      </div>
    </a>
    <a class="dl-card" id="dlV" download="vertical_9x16.mp4">
      <div class="dl-ico v">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="6" y="2" width="12" height="20" rx="2"/>
        </svg>
      </div>
      <div class="dl-name">Vertical</div>
      <div class="dl-meta" id="dlVmeta">9:16</div>
      <div class="dl-save">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11">
          <path d="M12 17V3"/><path d="M7 12l5 5 5-5"/>
        </svg>Save
      </div>
    </a>
  </div>
  <button class="btn-done" id="btnDone">Close</button>
</div>

<div class="toast" id="toast"></div>

<!-- Init overlay -->
<div class="init" id="initOverlay">
  <div class="init-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/>
    </svg>
  </div>
  <div class="init-title">DualShot</div>
  <div class="init-sub">Record 16:9 &amp; 9:16 simultaneously at full native quality.</div>
  <div class="chips">
    <span class="chip">No Re-encoding</span>
    <span class="chip">Native Quality</span>
    <span class="chip">Live PiP</span>
  </div>
  <button class="btn-allow" id="btnAllow">Allow Camera</button>
  <div class="init-err" id="initErr"></div>
</div>

<!-- FFmpeg.wasm (loads lazily when needed) -->
<script type="module">
  // ─────────────────────────────────────────────────────────
  //  APPROACH:
  //  1. Record the RAW camera stream directly with MediaRecorder
  //     (no canvas, no re-encoding) → this is the horizontal video,
  //     already at full native quality.
  //  2. After recording stops, load FFmpeg.wasm and use it to
  //     crop the raw recording to 9:16 using a lossless stream-copy
  //     (no re-encode of the video frames).
  //  3. The canvas is used ONLY for the live preview display.
  // ─────────────────────────────────────────────────────────

  import { FFmpeg } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
  import { fetchFile, toBlobURL } from 'https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/dist/esm/index.js';

  const srcVideo   = document.getElementById('srcVideo');
  const mainCanvas = document.getElementById('mainCanvas');
  const pipCanvas  = document.getElementById('pipCanvas');
  const mCtx = mainCanvas.getContext('2d');
  const pCtx = pipCanvas.getContext('2d');
  pipCanvas.width = 270; pipCanvas.height = 480;

  let stream = null, facingMode = 'environment';
  let rawRecorder, rawChunks = [];
  let recording = false, rafId = null;
  let timerInterval = null, elapsed = 0;
  let guideOn = true, currentView = 'h';
  let ffmpegLoaded = false;
  const ffmpeg = new FFmpeg();

  // ── Resize main canvas ──
  function resize() {
    mainCanvas.width  = window.innerWidth;
    mainCanvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Preview-only render loop (canvas is ONLY for display) ──
  function startRender() {
    if (rafId) cancelAnimationFrame(rafId);
    (function render() {
      if (srcVideo.readyState >= 2) {
        const vw = srcVideo.videoWidth, vh = srcVideo.videoHeight;
        const vSrcW = Math.round(vh * 9 / 16);
        const vSrcX = Math.round((vw - vSrcW) / 2);

        // PiP: 9:16 crop
        pCtx.drawImage(srcVideo, vSrcX, 0, vSrcW, vh, 0, 0, pipCanvas.width, pipCanvas.height);

        // Main display
        const mw = mainCanvas.width, mh = mainCanvas.height;
        mCtx.clearRect(0, 0, mw, mh);

        if (currentView === 'h') {
          const hSrcH = Math.round(vw * 9 / 16);
          const hSrcY = Math.round((vh - hSrcH) / 2);
          coverFit(mCtx, srcVideo, 0, hSrcY, vw, hSrcH, mw, mh);
          if (guideOn) drawGuide(mCtx, mw, mh, vSrcX, vSrcW, vw, vh);
        } else {
          mCtx.fillStyle = '#000';
          mCtx.fillRect(0, 0, mw, mh);
          const dw = Math.min(mw, mh * 9 / 16);
          const dh = dw * 16 / 9;
          mCtx.drawImage(srcVideo, vSrcX, 0, vSrcW, vh,
            (mw - dw) / 2, (mh - dh) / 2, dw, dh);
        }
      }
      rafId = requestAnimationFrame(render);
    })();
  }

  function coverFit(ctx, src, sx, sy, sw, sh, dw, dh) {
    const sr = sw/sh, dr = dw/dh;
    let W, H;
    if (sr > dr) { H = dh; W = dh*sr; } else { W = dw; H = dw/sr; }
    ctx.drawImage(src, sx, sy, sw, sh, (dw-W)/2, (dh-H)/2, W, H);
  }

  function drawGuide(ctx, mw, mh, vSrcX, vSrcW, streamW, streamH) {
    const hSrcH = Math.round(streamW * 9 / 16);
    const sr = streamW / hSrcH, dr = mw / mh;
    let W, H, ox, oy;
    if (sr > dr) { H = mh; W = mh*sr; ox=(mw-W)/2; oy=0; }
    else         { W = mw; H = mw/sr; ox=0; oy=(mh-H)/2; }
    const scaleX = W / streamW;
    const left = ox + vSrcX * scaleX;
    const cw = vSrcW * scaleX;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.42)';
    ctx.fillRect(ox, oy, left-ox, H);
    ctx.fillRect(left+cw, oy, (ox+W)-(left+cw), H);
    ctx.strokeStyle = 'rgba(255,140,66,0.85)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([6,5]);
    ctx.strokeRect(left+0.75, oy+0.75, cw-1.5, H-1.5);
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(255,140,66,0.95)';
    ctx.font = '500 10px "DM Mono",monospace';
    ctx.fillText('9:16', left+8, oy+18);
    ctx.restore();
  }

  // ── View toggle ──
  window.setView = function(v) {
    currentView = v;
    document.getElementById('tabH').classList.toggle('active', v==='h');
    document.getElementById('tabV').classList.toggle('active', v==='v');
    document.getElementById('pip').style.display = v==='h' ? 'block' : 'none';
  };

  // ── Camera ──
  async function initCamera(facing) {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: facing } },
        audio: true
      });
      srcVideo.srcObject = stream;
      await new Promise(r => srcVideo.onloadedmetadata = r);
      srcVideo.play();
      startRender();
      return true;
    } catch { return false; }
  }

  // ── Best mime for raw recording ──
  function bestMime() {
    // Prefer mp4 (H.264) for widest compatibility after FFmpeg processing
    const types = [
      'video/mp4;codecs=h264,aac',
      'video/mp4;codecs=avc1',
      'video/mp4',
      'video/webm;codecs=vp9',
      'video/webm;codecs=vp8',
      'video/webm',
    ];
    return types.find(t => MediaRecorder.isTypeSupported(t)) || '';
  }

  // ── Timer ──
  function startTimer() {
    elapsed = 0;
    timerInterval = setInterval(() => {
      elapsed++;
      document.getElementById('timerDisp').textContent =
        `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
    }, 1000);
  }

  // ── Toast ──
  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  // ── Recording ──
  function startRecording() {
    rawChunks = [];
    const mime = bestMime();
    // Record directly from the camera stream — no canvas, no quality loss
    const opts = mime ? { mimeType: mime } : {};
    try { rawRecorder = new MediaRecorder(stream, opts); }
    catch { rawRecorder = new MediaRecorder(stream); }

    rawRecorder.ondataavailable = e => { if (e.data.size > 0) rawChunks.push(e.data); };
    rawRecorder.onstop = () => processRecording();
    rawRecorder.start(100);

    recording = true;
    document.getElementById('btnRecord').classList.add('recording');
    document.getElementById('recTimer').classList.add('show');
    document.getElementById('sdot').classList.add('live');
    document.getElementById('statusTxt').textContent = 'REC';
    document.getElementById('iconGuide').style.display = 'block';
    document.getElementById('iconDl').style.display = 'none';
    startTimer();
    toast('Recording at full native quality');
  }

  function stopRecording() {
    rawRecorder.stop();
    recording = false;
    document.getElementById('btnRecord').classList.remove('recording');
    document.getElementById('recTimer').classList.remove('show');
    document.getElementById('sdot').classList.remove('live');
    document.getElementById('statusTxt').textContent = 'PROCESSING…';
    clearInterval(timerInterval);
  }

  // ── FFmpeg processing ──
  async function processRecording() {
    const proc = document.getElementById('processing');
    const procBar = document.getElementById('procBar');
    const procStep = document.getElementById('procStep');
    const procSub = document.getElementById('procSub');
    proc.classList.add('show');

    try {
      // Step 1: load FFmpeg if not already loaded
      if (!ffmpegLoaded) {
        procStep.textContent = 'LOADING FFMPEG';
        procSub.textContent = 'Loading video processor (one-time, ~10MB)…';
        procBar.style.width = '10%';

        // Use CDN-hosted ffmpeg core
        const baseURL = 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
        await ffmpeg.load({
          coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
          wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
        });
        ffmpegLoaded = true;
      }

      procStep.textContent = 'READING VIDEO';
      procSub.textContent = 'Reading recorded footage…';
      procBar.style.width = '25%';

      // Get the raw recording blob
      const mime = rawRecorder.mimeType || 'video/webm';
      const ext = mime.includes('mp4') ? 'mp4' : 'webm';
      const rawBlob = new Blob(rawChunks, { type: mime });
      const rawData = await fetchFile(rawBlob);

      // Write input to FFmpeg virtual filesystem
      await ffmpeg.writeFile(`input.${ext}`, rawData);

      // Get video dimensions from the stream
      const vw = srcVideo.videoWidth, vh = srcVideo.videoHeight;
      const vSrcW = Math.round(vh * 9 / 16);
      const vSrcX = Math.round((vw - vSrcW) / 2);
      const hSrcH = Math.round(vw * 9 / 16);
      const hSrcY = Math.round((vh - hSrcH) / 2);

      // Ensure crop values are even (required by most codecs)
      const cropVW = vSrcW % 2 === 0 ? vSrcW : vSrcW - 1;
      const cropVH = vh % 2 === 0 ? vh : vh - 1;
      const cropHW = vw % 2 === 0 ? vw : vw - 1;
      const cropHH = hSrcH % 2 === 0 ? hSrcH : hSrcH - 1;

      // Step 2: extract horizontal 16:9 with stream copy (zero re-encoding of video)
      procStep.textContent = 'HORIZONTAL VIDEO';
      procSub.textContent = 'Trimming to 16:9 — no re-encoding…';
      procBar.style.width = '45%';

      ffmpeg.on('progress', ({ progress }) => {
        if (progress >= 0) procBar.style.width = `${45 + progress * 20}%`;
      });

      await ffmpeg.exec([
        '-i', `input.${ext}`,
        '-vf', `crop=${cropHW}:${cropHH}:0:${hSrcY}`,
        '-c:v', 'copy',   // stream-copy: zero quality loss on video
        '-c:a', 'copy',   // stream-copy audio too
        '-movflags', '+faststart',
        'horizontal.mp4'
      ]);

      // If copy fails (codec mismatch), fall back to re-encode at high quality
      let hData;
      try {
        hData = await ffmpeg.readFile('horizontal.mp4');
      } catch {
        await ffmpeg.exec([
          '-i', `input.${ext}`,
          '-vf', `crop=${cropHW}:${cropHH}:0:${hSrcY}`,
          '-c:v', 'libx264', '-crf', '14', '-preset', 'fast',
          '-c:a', 'aac', '-b:a', '192k',
          'horizontal_fb.mp4'
        ]);
        hData = await ffmpeg.readFile('horizontal_fb.mp4');
      }

      // Step 3: extract vertical 9:16
      procStep.textContent = 'VERTICAL VIDEO';
      procSub.textContent = 'Trimming to 9:16 — no re-encoding…';
      procBar.style.width = '70%';

      ffmpeg.on('progress', ({ progress }) => {
        if (progress >= 0) procBar.style.width = `${70 + progress * 20}%`;
      });

      await ffmpeg.exec([
        '-i', `input.${ext}`,
        '-vf', `crop=${cropVW}:${cropVH}:${vSrcX}:0`,
        '-c:v', 'copy',
        '-c:a', 'copy',
        '-movflags', '+faststart',
        'vertical.mp4'
      ]);

      let vData;
      try {
        vData = await ffmpeg.readFile('vertical.mp4');
      } catch {
        await ffmpeg.exec([
          '-i', `input.${ext}`,
          '-vf', `crop=${cropVW}:${cropVH}:${vSrcX}:0`,
          '-c:v', 'libx264', '-crf', '14', '-preset', 'fast',
          '-c:a', 'aac', '-b:a', '192k',
          'vertical_fb.mp4'
        ]);
        vData = await ffmpeg.readFile('vertical_fb.mp4');
      }

      procBar.style.width = '95%';
      procStep.textContent = 'FINALISING';

      // Create download links
      const hBlob = new Blob([hData.buffer], { type: 'video/mp4' });
      const vBlob = new Blob([vData.buffer], { type: 'video/mp4' });

      document.getElementById('dlH').href = URL.createObjectURL(hBlob);
      document.getElementById('dlV').href = URL.createObjectURL(vBlob);
      document.getElementById('dlHmeta').textContent =
        `${cropHW}×${cropHH} · ${(hBlob.size/1048576).toFixed(1)}MB`;
      document.getElementById('dlVmeta').textContent =
        `${cropVW}×${cropVH} · ${(vBlob.size/1048576).toFixed(1)}MB`;

      // Clean up FFmpeg virtual FS
      try {
        await ffmpeg.deleteFile(`input.${ext}`);
        await ffmpeg.deleteFile('horizontal.mp4');
        await ffmpeg.deleteFile('vertical.mp4');
      } catch {}

      procBar.style.width = '100%';
      document.getElementById('statusTxt').textContent = 'READY';
      document.getElementById('iconGuide').style.display = 'none';
      document.getElementById('iconDl').style.display = 'block';

      setTimeout(() => {
        proc.classList.remove('show');
        document.getElementById('dlSheet').classList.add('open');
        toast('Native quality videos ready!');
      }, 400);

    } catch (err) {
      console.error('FFmpeg error:', err);
      // Fallback: serve raw recording as horizontal, skip vertical crop
      procSub.textContent = 'FFmpeg unavailable — serving raw recording…';
      procBar.style.width = '100%';

      const mime = rawRecorder.mimeType || 'video/webm';
      const ext = mime.includes('mp4') ? 'mp4' : 'webm';
      const rawBlob = new Blob(rawChunks, { type: mime });
      document.getElementById('dlH').href = URL.createObjectURL(rawBlob);
      document.getElementById('dlH').download = `horizontal_raw.${ext}`;
      document.getElementById('dlHmeta').textContent = `Raw · ${(rawBlob.size/1048576).toFixed(1)}MB`;
      document.getElementById('dlVmeta').textContent = 'See horizontal (fallback)';
      document.getElementById('statusTxt').textContent = 'READY';
      document.getElementById('iconGuide').style.display = 'none';
      document.getElementById('iconDl').style.display = 'block';

      setTimeout(() => {
        proc.classList.remove('show');
        document.getElementById('dlSheet').classList.add('open');
        toast('FFmpeg failed — raw video available');
      }, 800);
    }
  }

  // ── Buttons ──
  document.getElementById('btnRecord').addEventListener('click', () => {
    if (!stream) return;
    recording ? stopRecording() : startRecording();
  });

  document.getElementById('btnFlip').addEventListener('click', async () => {
    if (recording) { toast('Stop recording first'); return; }
    facingMode = facingMode === 'environment' ? 'user' : 'environment';
    toast(facingMode === 'user' ? 'Front camera' : 'Rear camera');
    await initCamera(facingMode);
  });

  document.getElementById('btnAction').addEventListener('click', () => {
    const hasDl = document.getElementById('iconDl').style.display !== 'none';
    if (hasDl) {
      document.getElementById('dlSheet').classList.add('open');
    } else {
      guideOn = !guideOn;
      toast(guideOn ? 'Guide on' : 'Guide off');
    }
  });

  document.getElementById('btnDone').addEventListener('click', () => {
    document.getElementById('dlSheet').classList.remove('open');
  });

  // Swipe sheet down to close
  const sheet = document.getElementById('dlSheet');
  let sy0 = 0;
  sheet.addEventListener('touchstart', e => { sy0 = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchmove', e => {
    const dy = e.touches[0].clientY - sy0;
    if (dy > 0) sheet.style.transform = `translateY(${dy}px)`;
  }, { passive: true });
  sheet.addEventListener('touchend', e => {
    sheet.style.transform = '';
    if (e.changedTouches[0].clientY - sy0 > 80) sheet.classList.remove('open');
  });

  // ── Init ──
  document.getElementById('btnAllow').addEventListener('click', async () => {
    const btn = document.getElementById('btnAllow');
    btn.textContent = 'Opening…'; btn.disabled = true;
    const ok = await initCamera(facingMode);
    if (ok) {
      const o = document.getElementById('initOverlay');
      o.classList.add('hide');
      setTimeout(() => o.remove(), 380);
    } else {
      document.getElementById('initErr').textContent = 'Camera denied — check permissions';
      btn.textContent = 'Try Again'; btn.disabled = false;
    }
  });
</script>
</body>
</html>
